version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: incentivos
      POSTGRES_USER: incentivos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incentivos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database — points to local postgres container (no pgbouncer needed)
      DATABASE_URL: postgresql://incentivos:${POSTGRES_PASSWORD}@postgres:5432/incentivos
      DIRECT_URL: postgresql://incentivos:${POSTGRES_PASSWORD}@postgres:5432/incentivos

      # Auth
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      # Public URL (used in QR emails)
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL}

      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}

      # WhatsApp — optional, leave empty to disable
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}

      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}

volumes:
  pgdata:
