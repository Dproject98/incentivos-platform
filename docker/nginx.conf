# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy para incentivos-app
# Instalar en el HOST (no en Docker) junto con certbot para SSL
#
# Ubuntu/Debian:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp docker/nginx.conf /etc/nginx/sites-available/incentivos
#   sudo ln -s /etc/nginx/sites-available/incentivos /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d tudominio.com
# ─────────────────────────────────────────────────────────────────────────────

# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name tudominio.com;
    return 301 https://$host$request_uri;
}

# HTTPS — proxy a Next.js en puerto 3000
server {
    listen 443 ssl http2;
    server_name tudominio.com;

    # Certificados Let's Encrypt (certbot los rellena automáticamente)
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Tamaño máximo de subida (QR en base64, etc.)
    client_max_body_size 10M;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Caché de assets estáticos de Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
